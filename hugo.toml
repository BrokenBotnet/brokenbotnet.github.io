baseURL = "https://brokenbotnet.com/"
title = "Br🤖ken B🤖tnet"
locale = "en-us"
defaultContentLanguage = "en"
theme = "risotto"
enableRobotsTXT = true
enableGitInfo = true
timeZone = "Asia/Tokyo"

[frontmatter]
