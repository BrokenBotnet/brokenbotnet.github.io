<!DOCTYPE html>
<html class="no-js" lang="{{ site.Language.Lang }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body id="top">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="page page--nojs{{ if eq .Kind "404" }} page--404{{ end }}">
      <header class="page__header">
        {{ partial "header-nojs.html" . }}
      </header>

      <main id="main-content" class="page__body" tabindex="-1">
        {{ block "main" . }}{{ end }}
      </main>

      {{ if ne .Kind "404" }}
        <aside class="page__aside" aria-label="About and page navigation">
          <div class="aside__panel">
            <div class="aside__about">
              {{ partial "about.html" . }}
            </div>
            <hr class="aside__divider">
            <div class="aside__content">
              {{ block "aside" . }}{{ end }}
            </div>
          </div>
        </aside>
      {{ end }}

      <footer class="page__footer">
        {{ partial "footer-nojs.html" . }}
      </footer>
    </div>

    <a class="back-to-top back-to-top--nojs back-to-top--nojs-only{{ if eq .Kind "404" }} back-to-top--scriptfree-404{{ end }}" href="#top" title="Back to top" aria-label="Back to top"><span aria-hidden="true">↑</span></a>
  </body>
</html>
